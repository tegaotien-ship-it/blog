{% extends 'base.html' %}

{% block content %}

<h1>Create Blog</h1>

<form method="POST" enctype="multipart/form-data">

    <input 
        type="text" 
        name="title" 
        placeholder="Title" 
        required
    >

    <textarea
        name="content"
        placeholder="Content"
        required
        style="width:100%; min-height:250px; padding:15px; font-size:16px; resize:vertical;"
    ></textarea>

    <input 
        type="file" 
        name="image"
    >

    <button type="submit">Submit</button>

</form>

{% endblock %}
